<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 3 - CSS Grid Practice</title>
    <link rel="stylesheet" href="day3-grid.css">
</head>

<body>

    <h1>CSS Grid Gallery</h1>

    <div class="grid-container">
<div class="card">
    <img src="images/mountain.jpg" alt="Mountain">
    <h3>Mountain</h3>
    <p>Beautiful mountain scenery.</p>
</div>

<div class="card">
    <img src="images/lake.jpg" alt="Lake">
    <h3>Lake</h3>
    <p>Peaceful lake surrounded by trees.</p>
</div>

<div class="card">
    <img src="images/forest.jpg" alt="Forest">
    <h3>Forest</h3>
    <p>Green forest with fresh air.</p>
</div>

<div class="card">
    <img src="images/beach.jpg" alt="Beach">
    <h3>Beach</h3>
    <p>Sunny beach with blue water.</p>
</div>

<div class="card">
    <img src="images/desert.JPG" alt="Desert">
    <h3>Desert</h3>
    <p>Golden sand dunes under the clear sky.</p>
</div>

<div class="card">
    <img src="images/river.jpg" alt="River">
    <h3>River</h3>
    <p>A peaceful river flowing through nature.</p>
</div>

    </div>

</body>

</html>
